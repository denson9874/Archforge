name: Compile and Distribute AppImage Executable

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-appimage:
    name: Build Standalone Linux AppImage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js LTS
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Tauri Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          curl \
          file \
          libayatana-appindicator3-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          librsvg2-dev \
          libwebkit2gtk-4.1-dev \
          libxdo-dev \
          patchelf \
          pkg-config \
          tar \
          unzip \
          xz-utils

    - name: Install Development Dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Compile Standalone Linux AppImage Binary
      run: bash scripts/build-appimage.sh

    - name: Archive Built Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ArchWeaver-x86_64.AppImage
        path: ArchWeaver-x86_64.AppImage
        if-no-files-found: error

    - name: Publish Built AppImage to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ArchWeaver-x86_64.AppImage
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
