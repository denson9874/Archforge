<svg width="500" height="500" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="neon-glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="glassGradientTop" x1="20" y1="20" x2="100" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.32" />
      <stop offset="60%" stop-color="#0891b2" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.45" />
    </linearGradient>

    <linearGradient id="glassGradientMid" x1="20" y1="45" x2="100" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#4f46e5" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.45" />
    </linearGradient>

    <linearGradient id="glassGradientBot" x1="20" y1="70" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#312e81" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="strokeGradientTop" x1="20" y1="15" x2="100" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="30%" stop-color="#06b6d4" stop-opacity="0.7" />
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <linearGradient id="strokeGradientMid" x1="20" y1="40" x2="100" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4338ca" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <linearGradient id="strokeGradientBot" x1="20" y1="65" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="60%" stop-color="#1e1b4b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="laserBeam" x1="60" y1="15" x2="60" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="25%" stop-color="#22d3ee" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.6" />
      <stop offset="75%" stop-color="#6366f1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="particleGradient" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0b0e14" />

  <line id="center-laser" x1="60" y1="15" x2="60" y2="105" stroke="url(#laserBeam)" stroke-width="1" stroke-dasharray="3 3" />

  <g id="layer-bot">
    <polygon
      points="60,102 104,80 60,58 16,80"
      fill="#4338ca"
      opacity="0.12"
      filter="url(#neon-glow-indigo)"
    />
    <polygon
      points="60,101 103,79 60,57 17,79"
      fill="url(#glassGradientBot)"
    />
    <polygon
      points="60,101 103,79 60,57 17,79"
      stroke="url(#strokeGradientBot)"
      stroke-width="1.2"
      stroke-linejoin="round"
      stroke-linecap="round"
      opacity="0.85"
    />
    <line x1="60" y1="57" x2="60" y2="101" stroke="#4338ca" stroke-width="0.5" opacity="0.15" />
    <line x1="17" y1="79" x2="103" y2="79" stroke="#4338ca" stroke-width="0.5" opacity="0.15" />
  </g>

  <g id="layer-mid">
    <polygon
      points="60,73 103,51 60,29 17,51"
      fill="url(#glassGradientMid)"
    />
    <polygon
      points="60,73 103,51 60,29 17,51"
      stroke="url(#strokeGradientMid)"
      stroke-width="1.5"
      stroke-linejoin="round"
      stroke-linecap="round"
      opacity="0.9"
    />
    <circle cx="60" cy="51" r="1.5" fill="#6366f1" opacity="0.4" />
  </g>

  <g id="layer-top">
    <polygon
      points="60,45 103,23 60,1 17,23"
      fill="none"
      stroke="#22d3ee"
      stroke-width="1"
      opacity="0.25"
      filter="url(#neon-glow-cyan)"
    />
    <polygon
      points="60,45 103,23 60,1 17,23"
      fill="url(#glassGradientTop)"
    />
    <polygon
      points="60,45 103,23 60,1 17,23"
      stroke="url(#strokeGradientTop)"
      stroke-width="1.8"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <polygon
      points="60,33 81,23 60,13 39,23"
      fill="#111827"
      fill-opacity="0.45"
      stroke="#22d3ee"
      stroke-width="0.8"
      stroke-dasharray="2 1"
      opacity="0.85"
    />
    <circle cx="60" cy="23" r="1.5" fill="#e0f7fa" filter="url(#neon-glow-cyan)" />
  </g>

  <circle id="small-node-1" cx="30" cy="40" r="1.5" fill="url(#particleGradient)" opacity="0.65" />
  <circle id="small-node-2" cx="95" cy="42" r="1.2" fill="#818cf8" opacity="0.5" />
</svg>